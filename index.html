<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR磁力線テスト</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-marker preset="hiro" id="n-pole">
            <a-sphere radius="0.2" color="red"></a-sphere>
        </a-marker>

        <a-marker preset="kanji" id="s-pole">
            <a-sphere radius="0.2" color="blue"></a-sphere>
        </a-marker>

        <a-entity id="iron-field" position="0 0 -5"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const field = document.getElementById('iron-field');
        const grains = [];

        // 1. 砂鉄の粒を空中にグリッド状に並べる
        for (let x = -2; x <= 2; x += 0.5) {
            for (let y = -2; y <= 2; y += 0.5) {
                const grain = document.createElement('a-box');
                grain.setAttribute('width', '0.02');
                grain.setAttribute('height', '0.2');
                grain.setAttribute('depth', '0.02');
                grain.setAttribute('color', 'black');
                grain.setAttribute('position', {x: x, y: y, z: 0});
                field.appendChild(grain);
                grains.push(grain);
            }
        }

        // 2. 磁石の位置に合わせて向きを変える（簡易版）
        const nMarker = document.getElementById('n-pole');
        
        function update() {
            // マーカーが見つかったら、砂鉄がそっちを向くようにする
            if (nMarker.object3D.visible) {
                grains.forEach(g => {
                    g.setAttribute('color', 'orange'); // 見つかったら色を変えて合図
                });
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
